    line-height: 1.4;

  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--surface2); color: var(--accent); border-left-color: var(--accent); }

  #topbar {
    padding: 14px 24px; background: var(--surface); border-bottom: 1px solid var(--border);

  .tag {
    padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600;
    background: #1e3a5f; color: var(--accent);

  #content { flex: 1; overflow-y: auto; padding: 24px; }

  /* ── 卡片 ── */
  .chart-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    margin-bottom: 24px; overflow: hidden;
  }
  .chart-header { padding: 16px 20px 0; }
  .chart-header h3 { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .chart-header p  { font-size: 12px; color: var(--text2); }
  .chart-body { padding: 8px 4px 16px; }
  .echart { width: 100%; }

  /* ── 静态图片画廊 ── */
  .gallery-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px; padding: 4px;
  }
  .gallery-item {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    overflow: hidden; cursor: pointer; transition: transform .2s, border-color .2s;
  }
  .gallery-item:hover { transform: translateY(-3px); border-color: var(--accent); }
  .gallery-item img { width: 100%; display: block; background: #fff; }
  .gallery-item .caption {
    padding: 10px 12px; font-size: 12px; color: var(--text2);
    border-top: 1px solid var(--border);
  }

  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.88);

  #lightbox img { max-width: 92vw; max-height: 88vh; border-radius: 8px; object-fit: contain; }
  #lightbox-close {
    position: absolute; top: 20px; right: 28px; font-size: 28px;
    color: #fff; cursor: pointer; opacity: .7;
  }
  #lightbox-close:hover { opacity: 1; }

  .data-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .data-table th { padding: 8px 12px; background: var(--surface2); color: var(--text2); font-weight: 600; text-align: left; }
  .data-table td { padding: 7px 12px; border-bottom: 1px solid var(--border); }
  .data-table tr:hover td { background: var(--surface2); }

  /* ── 概览卡片 ── */
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 18px 20px;

  .stat-card .label { font-size: 11px; color: var(--text2); margin-bottom: 6px; }
  .stat-card .value { font-size: 24px; font-weight: 700; color: var(--accent); }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

const echartsMap = {};
function ec(id) {
  if (!echartsMap[id]) echartsMap[id] = echarts.init(document.getElementById(id), 'dark');
  return echartsMap[id];
}

const BASE = { backgroundColor:'transparent', textStyle:{color:'#94a3b8'} };

function initCharts(page) {
  if (page === 'overview') {
    // GDP + 增速
    const rates = NATIONAL.gdp.map((v,i)=> i===0 ? null : +((v-NATIONAL.gdp[i-1])/NATIONAL.gdp[i-1]*100).toFixed(2));
    ec('ov-gdp').setOption({...BASE, tooltip:{trigger:'axis'},
      legend:{data:['GDP(万亿)','同比增速(%)'],textStyle:{color:'#94a3b8'}},
      xAxis:{data:YEARS,axisLine:{lineStyle:{color:'#2e3352'}}},
      yAxis:[{name:'万亿元',nameTextStyle:{color:'#94a3b8'},axisLine:{lineStyle:{color:'#2e3352'}}},
             {name:'%',nameTextStyle:{color:'#94a3b8'},axisLine:{lineStyle:{color:'#2e3352'}}}],
      series:[
        {name:'GDP(万亿)',type:'bar',data:NATIONAL.gdp.map(v=>(v/10000).toFixed(2)),
         itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#4f8ef7'},{offset:1,color:'#1a3a6e'}])},barMaxWidth:40},
        {name:'同比增速(%)',type:'line',yAxisIndex:1,data:rates,
         lineStyle:{color:'#f7994f',width:2},itemStyle:{color:'#f7994f'},symbol:'circle',symbolSize:6},
      ]
    });

    // 饼图（最新两年对比）
    ec('ov-pie').setOption({...BASE, tooltip:{trigger:'item',formatter:'{b}: {c}%'},
      legend:{orient:'vertical',right:10,textStyle:{color:'#94a3b8'}},
      series:[{
        type:'pie',radius:['35%','65%'],center:['45%','55%'],
        label:{color:'#94a3b8'},
        data:[
          {name:'第一产业',value:NATIONAL.p1[9],itemStyle:{color:'#4fc98e'}},
          {name:'第二产业',value:NATIONAL.p2[9],itemStyle:{color:'#4f8ef7'}},
          {name:'第三产业',value:NATIONAL.p3[9],itemStyle:{color:'#f7994f'}},
        ]
      }]
    });

    // 省份柱状
    const sorted = [...PROV2024].sort((a,b)=>a.gdp-b.gdp);
    ec('ov-bar').setOption({...BASE, tooltip:{trigger:'axis',formatter:p=>`${p[0].name}: ${(p[0].value/10000).toFixed(2)}万亿`},
      grid:{left:60,right:16,top:10,bottom:10,containLabel:true},
      xAxis:{type:'value',axisLine:{lineStyle:{color:'#2e3352'}}},
      yAxis:{type:'category',data:sorted.map(d=>d.name),axisLine:{lineStyle:{color:'#2e3352'}},axisLabel:{fontSize:11}},
      series:[{type:'bar',data:sorted.map(d=>({value:d.gdp,itemStyle:{color:RC[d.r]||'#4f8ef7'}})),barMaxWidth:18,label:{show:false}}]
    });
  }

  if (page === 't1-trend') {
    const rates = NATIONAL.gdp.map((v,i)=> i===0 ? 0 : +((v-NATIONAL.gdp[i-1])/NATIONAL.gdp[i-1]*100).toFixed(2));
    ec('t1-gdp-trend').setOption({...BASE,
      tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
      legend:{data:['GDP总量(万亿)','同比增速(%)'],textStyle:{color:'#94a3b8'},top:0},
      grid:{top:40,bottom:30,left:60,right:60,containLabel:true},
      xAxis:{data:YEARS},
      yAxis:[
        {name:'GDP（万亿元）',nameTextStyle:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#2e3352'}}},
        {name:'增速（%）',nameTextStyle:{color:'#94a3b8'},splitLine:{show:false}}
      ],
      series:[
        {name:'GDP总量(万亿)',type:'bar',data:NATIONAL.gdp.map(v=>+(v/10000).toFixed(2)),
         itemStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'#4f8ef7'},{offset:1,color:'#1a3a6e'}])},barMaxWidth:50},
        {name:'同比增速(%)',type:'line',yAxisIndex:1,data:rates,
         smooth:true,lineStyle:{color:'#f7994f',width:2.5},
         areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(247,153,79,0.3)'},{offset:1,color:'rgba(247,153,79,0)'}])},
         itemStyle:{color:'#f7994f'},symbolSize:6,
         markPoint:{data:[{type:'max',name:'最大值'},{type:'min',name:'最小值'}],
           label:{color:'#fff'},itemStyle:{color:'#d62728'}}},
      ]
    });

    ec('t1-percap').setOption({...BASE,
      tooltip:{trigger:'axis',formatter:p=>`${p[0].axisValue}年<br>人均GDP: ${p[0].value.toLocaleString()}元`},
      grid:{top:20,bottom:30,left:60,right:16,containLabel:true},
      xAxis:{data:YEARS},
      yAxis:{name:'元',nameTextStyle:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#2e3352'}}},
      series:[{
        type:'line',data:NATIONAL.percapita,smooth:true,
        lineStyle:{color:'#4fc98e',width:2.5},
        areaStyle:{color:new echarts.graphic.LinearGradient(0,0,0,1,[{offset:0,color:'rgba(79,201,142,0.35)'},{offset:1,color:'rgba(79,201,142,0)'}])},
        itemStyle:{color:'#4fc98e'},symbolSize:7,
        markLine:{data:[{yAxis:70000,name:'7万元',lineStyle:{color:'#f7994f',type:'dashed'},
          label:{formatter:'人均7万元（约1万美元）',color:'#f7994f'}}]}
      }]
    });
  }

  if (page === 't1-structure') {
    ec('t1-stacked').setOption({...BASE,
      tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
      legend:{data:['第一产业','第二产业','第三产业'],textStyle:{color:'#94a3b8'}},
      grid:{top:40,bottom:30,left:60,right:16,containLabel:true},
      xAxis:{data:YEARS},
      yAxis:{name:'亿元',nameTextStyle:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#2e3352'}}},
      series:[
        {name:'第一产业',type:'bar',stack:'total',data:NATIONAL.ind1,itemStyle:{color:'#4fc98e'}},
        {name:'第二产业',type:'bar',stack:'total',data:NATIONAL.ind2,itemStyle:{color:'#4f8ef7'}},
        {name:'第三产业',type:'bar',stack:'total',data:NATIONAL.ind3,itemStyle:{color:'#f7994f'}},
      ]
    });

    ec('t1-ratio').setOption({...BASE,
      tooltip:{trigger:'axis',formatter:params=>params[0].axisValue+'年<br>'+params.map(p=>`${p.marker}${p.seriesName}: ${p.value}%`).join('<br>')},
      legend:{data:['第一产业占比','第二产业占比','第三产业占比'],textStyle:{color:'#94a3b8'}},
      grid:{top:40,bottom:30,left:60,right:16,containLabel:true},
      xAxis:{data:YEARS},
      yAxis:{name:'%',nameTextStyle:{color:'#94a3b8'},min:0,max:70,splitLine:{lineStyle:{color:'#2e3352'}}},
      series:[
        {name:'第一产业占比',type:'line',data:NATIONAL.p1,smooth:true,lineStyle:{color:'#4fc98e',width:2},itemStyle:{color:'#4fc98e'},symbolSize:6},
        {name:'第二产业占比',type:'line',data:NATIONAL.p2,smooth:true,lineStyle:{color:'#4f8ef7',width:2},itemStyle:{color:'#4f8ef7'},symbolSize:6},
        {name:'第三产业占比',type:'line',data:NATIONAL.p3,smooth:true,lineStyle:{color:'#f7994f',width:2},itemStyle:{color:'#f7994f'},symbolSize:6},
      ]
    });
  }

  if (page === 't1-detail') {
    const inds = Object.keys(NATIONAL.industry);
    const colors = ['#4fc98e','#4f8ef7','#f7994f','#c084fc','#fb923c','#38bdf8','#f472b6','#a3e635','#facc15'];
    ec('t1-ind-line').setOption({...BASE,
      tooltip:{trigger:'axis'},
      legend:{type:'scroll',textStyle:{color:'#94a3b8'},top:0,pageTextStyle:{color:'#94a3b8'}},
      grid:{top:50,bottom:30,left:60,right:16,containLabel:true},
      xAxis:{data:YEARS},
      yAxis:{name:'亿元',nameTextStyle:{color:'#94a3b8'},splitLine:{lineStyle:{color:'#2e3352'}}},
      series: inds.map((ind,i)=>({
        name:ind,type:'line',data:NATIONAL.industry[ind],smooth:true,
        lineStyle:{color:colors[i],width:2},itemStyle:{color:colors[i]},symbolSize:5,
      }))
    });

    const lastYearData = inds.map((ind,i)=>({
      name:ind, value:NATIONAL.industry[ind][9], itemStyle:{color:colors[i]}
    }));
    ec('t1-ind-pie').setOption({...BASE,
      tooltip:{trigger:'item',formatter:'{b}: {c}亿元 ({d}%)'},
      legend:{type:'scroll',orient:'vertical',right:10,textStyle:{color:'#94a3b8'}},
      series:[{type:'pie',radius:['30%','60%'],center:['40%','55%'],
        label:{formatter:'{b}\n{d}%',color:'#94a3b8'},
        data:lastYearData
      }]
    });
  }

  if (page === 't2-rank') {
    window._provBarData = PROV2024;
    renderProvBar('all');
  }

  if (page === 't2-industry') {
    const sorted = [...PROV2024].sort((a,b)=>b.gdp-a.gdp);
    const names = sorted.map(d=>d.name);
    const total = sorted.map(d=>d.gdp);
    ec('t2-ind-stack').setOption({...BASE,
      tooltip:{trigger:'axis',axisPointer:{type:'shadow'}},
      legend:{data:['第一产业','第二产业','第三产业'],textStyle:{color:'#94a3b8'}},
      grid:{top:40,bottom:10,left:60,right:16,containLabel:true},
      xAxis:{type:'value',axisLine:{lineStyle:{color:'#2e3352'}},
        axisLabel:{formatter:v=>(v/10000).toFixed(0)+'万亿'}},
      yAxis:{type:'category',data:[...names].reverse(),axisLabel:{fontSize:11},axisLine:{lineStyle:{color:'#2e3352'}}},
      series:[
        {name:'第一产业',type:'bar',stack:'t',data:[...sorted].reverse().map(d=>d.ind1),itemStyle:{color:'#4fc98e'},barMaxWidth:18},
        {name:'第二产业',type:'bar',stack:'t',data:[...sorted].reverse().map(d=>d.ind2),itemStyle:{color:'#4f8ef7'},barMaxWidth:18},
        {name:'第三产业',type:'bar',stack:'t',data:[...sorted].reverse().map(d=>d.ind3),itemStyle:{color:'#f7994f'},barMaxWidth:18},
      ]
    });
  }

  if (page === 't2-growth') {
    const withGrowth = PROV2024.map(d=>({
      ...d,
      growth: PROV2015[d.name] ? +((d.gdp-PROV2015[d.name])/PROV2015[d.name]*100).toFixed(1) : 0
    })).sort((a,b)=>b.growth-a.growth);

    ec('t2-growth-bar').setOption({...BASE,
      tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>十年增速: ${p[0].value}%`},
      grid:{top:10,bottom:10,left:60,right:30,containLabel:true},
      xAxis:{type:'value',axisLine:{lineStyle:{color:'#2e3352'}},axisLabel:{formatter:'{value}%'}},
      yAxis:{type:'category',data:withGrowth.map(d=>d.name).reverse(),axisLabel:{fontSize:11},axisLine:{lineStyle:{color:'#2e3352'}}},
      series:[{type:'bar',
        data:withGrowth.map(d=>({value:d.growth,itemStyle:{color:d.growth>100?'#d62728':RC[d.r]||'#4f8ef7'}})).reverse(),
        barMaxWidth:16,
        label:{show:false}
      }]

let _provBarChart = null;
function renderProvBar(region) {
  const data = region === 'all' ? PROV2024 : PROV2024.filter(d=>d.r===region);
  const sorted = [...data].sort((a,b)=>a.gdp-b.gdp);
  if (!_provBarChart) _provBarChart = echarts.init(document.getElementById('t2-prov-bar'), 'dark');
  _provBarChart.setOption({

    tooltip:{trigger:'axis',formatter:p=>`${p[0].name}<br>GDP: ${(p[0].value/10000).toFixed(2)}万亿`},

    xAxis:{type:'value',axisLabel:{formatter:v=>(v/10000).toFixed(0)+'万亿'},axisLine:{lineStyle:{color:'#2e3352'}}},
    yAxis:{type:'category',data:sorted.map(d=>d.name),axisLabel:{fontSize:10,interval:0},axisLine:{lineStyle:{color:'#2e3352'}}},
    series:[{
      type:'bar',
      data:sorted.map(d=>({value:d.gdp,itemStyle:{color:RC[d.r]}})),
      barMaxWidth:20,
      label:{show:true,position:'right',formatter:p=>(p.value/10000).toFixed(2),fontSize:10,color:'#94a3b8'}
    }]
  });
}

function filterProvBar(btn, region) {
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderProvBar(region);
}

    xAxis3D: { name: '人均GDP（万元）', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' } },
    yAxis3D: { name: 'GDP十年增速（%）', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' } },
    zAxis3D: { name: '第三产业占比（%）', nameTextStyle: { color: '#94a3b8' }, axisLabel: { color: '#94a3b8' } },
    grid3D: {
      viewControl: { autoRotate: true, autoRotateSpeed: 5, rotateSensitivity: 2, alpha: 22, beta: -50 },
      boxWidth: 180, boxDepth: 120, boxHeight: 100,
      light: { main: { intensity: 1.2 }, ambient: { intensity: 0.5 } },
    },
    series,
  });
  echartsMap['t3d-scat'] = chart;
}

function init3DBar() {
  _3dBarChart = echarts.init(document.getElementById('t3d-bar3'), 'dark');
  const provs = [...PROV2024].sort((a,b) => b.gdp - a.gdp).slice(0, 20);
  const industries = ['第一产业','第二产业','第三产业'];
  const iColors = ['#4fc98e','#4f8ef7','#f7994f'];
  const data = [];
  provs.forEach((d, xi) => {
    [d.ind1, d.ind2, d.ind3].forEach((val, yi) => data.push([xi, yi, +(val/10000).toFixed(3)]));
  });

  _3dBarChart.setOption({
    backgroundColor: 'transparent',
    tooltip: {
      formatter: p => `${provs[p.data[0]].name}<br>${industries[p.data[1]]}<br>${(p.data[2]).toFixed(3)}万亿元`,
    },
    visualMap: {
      show: false, dimension: 1,
      inRange: { color: iColors },
      categories: [0, 1, 2],
    },
    xAxis3D: {
      type: 'category', data: provs.map(d => d.name),
      name: '省份', nameTextStyle: { color: '#94a3b8' },
      axisLabel: { color: '#94a3b8', fontSize: 9, rotate: 20 },
    },
    yAxis3D: {
      type: 'category', data: industries,
      name: '产业', nameTextStyle: { color: '#94a3b8' },
      axisLabel: { color: '#94a3b8', fontSize: 10 },
    },
    zAxis3D: {
      type: 'value', name: '增加值（万亿）',
      nameTextStyle: { color: '#94a3b8' },
      axisLabel: { color: '#94a3b8' },
    },
    grid3D: {
      viewControl: { autoRotate: false, rotateSensitivity: 2, alpha: 30, beta: -60 },
      boxWidth: 220, boxDepth: 80, boxHeight: 100,
      light: { main: { intensity: 1.4, shadow: true }, ambient: { intensity: 0.4 } },
    },
    series: [{
      type: 'bar3D',
      data: data.map(d => ({
        value: d,
        itemStyle: { color: iColors[d[1]], opacity: 0.88 },
      })),
      shading: 'lambert',
      label: { show: false },
      emphasis: { label: { show: true, color: '#fff', fontSize: 11 } },
      bevelSize: 0.3, bevelSmoothness: 4,
    }],
  });
  echartsMap['t3d-bar3'] = _3dBarChart;
}

function set3dBarView(btn, alpha, beta) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (_3dBarChart) {
    _3dBarChart.setOption({ grid3D: { viewControl: { alpha, beta } } });
  }
}

  't2-rank':   {title:'任务二 · 2024省份GDP排名', desc:'31省GDP总量排名，可按地区筛选'},

  't3d-scatter':{title:'3D · 三维经济散点', desc:'人均GDP × 增速 × 第三产业占比'},
  't3d-bar':    {title:'3D · 省份产业柱状', desc:'2024年各省三产业增加值立体展示'},
};

let currentPage = 'overview';

function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el=>{
    el.classList.toggle('active', el.dataset.page === page);
  });
  const info = pageInfo[page] || {title:page, desc:''};
  document.getElementById('page-title').textContent = info.title;
  document.getElementById('page-desc').textContent  = info.desc;
  document.getElementById('content').innerHTML = (pages[page]||(() => '<p>页面开发中</p>'))();

  // 过滤按钮样式
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.style.cssText = 'padding:4px 12px;border-radius:6px;border:1px solid #2e3352;background:#1a1d27;color:#94a3b8;cursor:pointer;font-size:12px;';
  });
  document.querySelectorAll('.filter-btn.active').forEach(btn=>{
    btn.style.background = '#1e3a5f';
    btn.style.color = '#4f8ef7';
    btn.style.borderColor = '#4f8ef7';
  });

  // ECharts 需要等 DOM 渲染后初始化
  Object.values(echartsMap).forEach(c=>c.dispose && c.dispose());
  Object.keys(echartsMap).forEach(k=>delete echartsMap[k]);
  _provBarChart = null;

  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    initCharts(page);
    if (page === 't3d-surface') init3DSurface();
    if (page === 't3d-scatter') init3DScatter();
    if (page === 't3d-bar')     init3DBar();
  }));
}

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click', ()=> navigate(el.dataset.page));
});

// 灯箱
function lightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('show');
}
document.getElementById('lightbox-close').addEventListener('click', ()=>{
  document.getElementById('lightbox').classList.remove('show');
});
document.getElementById('lightbox').addEventListener('click', e=>{
  if (e.target === document.getElementById('lightbox')) document.getElementById('lightbox').classList.remove('show');
});

// 窗口 resize
window.addEventListener('resize', ()=>Object.values(echartsMap).forEach(c=>c.resize()));

// 初始化
navigate('overview');
</script>
